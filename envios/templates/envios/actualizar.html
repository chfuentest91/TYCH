<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TYCH - Actualizar Envío</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <nav class="navbar navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand fw-bold">TYCH - Envíos</a>
            <a href="/envios/" class="btn btn-outline-light btn-sm">Volver a Envíos</a>
        </div>
    </nav>

    <div class="container mt-5" style="max-width:500px;">
        <div class="card shadow">
            <div class="card-header bg-dark text-white">
                <strong>Actualizar estado de envío</strong>
            </div>
            <div class="card-body">
                <p><strong>Orden:</strong> {{ envio.orden.buy_order }}</p>
                <p><strong>Prenda:</strong> {{ envio.orden.prenda.nombre }}</p>
                <p><strong>Cliente:</strong> {{ envio.orden.usuario.get_full_name|default:envio.orden.usuario.username }}</p>
                <hr>
                <form method="POST">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label fw-bold">Estado del envío</label>
                        <select name="estado" class="form-select">
                            <option value="pendiente"  {% if envio.estado == 'pendiente'  %}selected{% endif %}>Pendiente</option>
                            <option value="en_camino"  {% if envio.estado == 'en_camino'  %}selected{% endif %}>En camino</option>
                            <option value="entregado"  {% if envio.estado == 'entregado'  %}selected{% endif %}>Entregado</option>
                        </select>
                    </div>
                    <button type="submit" class="btn btn-dark w-100">Guardar cambio</button>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
