<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>TYCH — Cambiar Estado</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <nav class="navbar navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand fw-bold">TYCH</a>
            <a href="/catalogo/" class="btn btn-outline-light btn-sm">Volver al Catálogo</a>
        </div>
    </nav>
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow">
                    <div class="card-header bg-dark text-white text-center">
                        <h4>Cambiar Estado: {{ prenda.nombre }}</h4>
                    </div>
                    <div class="card-body">
                        <p><strong>Estado actual:</strong>
                            <span class="badge
                                {% if prenda.estado == 'disponible' %}bg-success
                                {% elif prenda.estado == 'reservada' %}bg-warning text-dark
                                {% else %}bg-danger{% endif %}">
                                {{ prenda.estado|capfirst }}
                            </span>
                        </p>
                        <form method="POST">
                            {% csrf_token %}
                            <div class="mb-3">
                                <label class="form-label">Nuevo Estado</label>
                                <select name="estado" class="form-control">
                                    <option value="disponible">Disponible</option>
                                    <option value="reservada">Reservada</option>
                                    <option value="vendida">Vendida</option>
                                </select>
                            </div>
                            <button type="submit" class="btn btn-dark w-100">Guardar Estado</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
