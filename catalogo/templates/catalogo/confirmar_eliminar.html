<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>TYCH - Eliminar Prenda</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <nav class="navbar navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand fw-bold">TYCH</a>
            <a href="/catalogo/" class="btn btn-outline-light btn-sm">Volver al Catálogo</a>
        </div>
    </nav>
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow border-danger">
                    <div class="card-header bg-danger text-white text-center">
                        <h4>Eliminar Prenda</h4>
                    </div>
                    <div class="card-body text-center">
                        {% if prenda.imagen %}
                            <img src="{{ prenda.imagen.url }}" style="max-height:150px;" class="img-thumbnail mb-3">
                        {% endif %}
                        <p class="fs-5">¿Estás seguro que deseas eliminar <strong>{{ prenda.nombre }}</strong>?</p>
                        <p class="text-muted">Esta acción no se puede deshacer.</p>
                        <form method="POST">
                            {% csrf_token %}
                            <a href="/catalogo/" class="btn btn-secondary me-2">Cancelar</a>
                            <button type="submit" class="btn btn-danger">Sí, eliminar</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
