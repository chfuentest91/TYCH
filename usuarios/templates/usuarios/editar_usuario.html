<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TYCH — Editar Usuario</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <nav class="navbar navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand fw-bold">TYCH — Usuarios</a>
            <a href="/usuarios/gestion/" class="btn btn-outline-light btn-sm">Volver</a>
        </div>
    </nav>
    <div class="container mt-5" style="max-width:500px;">
        <div class="card shadow">
            <div class="card-header bg-dark text-white">
                <strong>Editar: {{ cliente.username }}</strong>
            </div>
            <div class="card-body">
                {% if messages %}
                {% for message in messages %}
                <div class="alert alert-info">{{ message }}</div>
                {% endfor %}
                {% endif %}
                <form method="POST">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label">Nombre</label>
                        <input type="text" name="first_name" class="form-control" value="{{ cliente.first_name }}">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Apellido</label>
                        <input type="text" name="last_name" class="form-control" value="{{ cliente.last_name }}">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input type="email" name="email" class="form-control" value="{{ cliente.email }}">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">RUT</label>
                        <input type="text" name="rut" class="form-control" value="{{ cliente.rut|default:'' }}">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Teléfono</label>
                        <input type="text" name="telefono" class="form-control" value="{{ cliente.telefono|default:'' }}">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Dirección</label>
                        <input type="text" name="direccion" class="form-control" value="{{ cliente.direccion|default:'' }}">
                    </div>
                    <button type="submit" class="btn btn-dark w-100">Guardar cambios</button>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
